<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription | GreenNest Realty</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body class="auth-page">

<section class="about-header">
  <div class="about-header-container">
    <a class="logo">
      <h2>🌿 GreenNest <span>Realty</span></h2>
    </a>

    <a href="index.html" class="btn btn-primary">Retour à l'accueil</a>
  </div>
</section>

<main class="auth-container">
  <div class="auth-card">

    <h2>Créer un compte</h2>
    <p>Rejoignez la communauté GreenNest et trouvez votre futur foyer.</p>

    <!-- GOOGLE SIGN IN -->
    <div class="google-auth">
      <button type="button" id="googleSignIn" class="btn-google">
        <i class="fab fa-google"></i>
        Continuer avec Google
      </button>
    </div>

    <div class="auth-divider">
      <span>ou</span>
    </div>

    <form id="registerForm">

      <div class="input-group">
        <label for="fullname">Nom Complet</label>
        <input type="text" id="fullname" placeholder="Ex: Jean Dupont" required>
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="exemple@mail.com" required>
      </div>

      <div class="input-group">
        <label for="phone">Téléphone</label>
        <input type="tel" id="phone" placeholder="+33 6 00 00 00 00" required>
      </div>

      <div class="input-group password-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" required>
        <span class="toggle-password" data-target="password"><i class="fas fa-eye"></i></span>
      </div>

      <div class="input-group password-group">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" required>
        <span class="toggle-password" data-target="confirmPassword"><i class="fas fa-eye"></i></span>
      </div>

      <button type="submit" class="btn-auth">
        Créer un compte
      </button>

    </form>

    <p class="auth-footer">
      Déjà inscrit ? <a href="login.html">Connectez-vous ici</a>
    </p>

  </div>
</main>


<!-- Script pour voir/masquer le mot de passe -->
<script>
const togglePasswordIcons = document.querySelectorAll('.toggle-password');

togglePasswordIcons.forEach(icon => {
  icon.addEventListener('click', () => {
    const targetId = icon.dataset.target;
    const input = document.getElementById(targetId);

    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<i class="fas fa-eye-slash"></i>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<i class="fas fa-eye"></i>';
    }
  });
});
</script>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// CONFIG FIREBASE (remplace par ta config si nécessaire)
const firebaseConfig = {
  apiKey: "AIzaSyDb7y807LAXmV2ST_EdA_L-LdBcbc6SKN8",
  authDomain: "green-nest-realty-immobilier.firebaseapp.com",
  projectId: "green-nest-realty-immobilier",
  storageBucket: "green-nest-realty-immobilier.firebasestorage.app",
  messagingSenderId: "1037762102556",
  appId: "1:1037762102556:web:f78e8d720783bbbdf426d9"
};


// INITIALISATION
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// FORMULAIRE INSCRIPTION
const btn=document.querySelector(".btn-auth");

registerForm.addEventListener("submit",async(e)=>{

e.preventDefault();

btn.classList.add("loading");
btn.innerHTML='<span class="spinner"></span>';

const fullname=document.getElementById("fullname").value;
const email=document.getElementById("email").value;
const phone=document.getElementById("phone").value;
const password=document.getElementById("password").value;
const confirmPassword=document.getElementById("confirmPassword").value;

if(password!==confirmPassword){

showToast("Les mots de passe ne correspondent pas","#e53935");

btn.classList.remove("loading");
btn.innerHTML="Créer un compte";
return;

}

try{

const userCredential=await createUserWithEmailAndPassword(auth,email,password);
const user=userCredential.user;

await addDoc(collection(db,"users"),{
fullname,
email,
phone,
uid:user.uid,
favorites:[],
createdAt:serverTimestamp()
});

showToast("Inscription réussie 🎉");

setTimeout(()=>{
window.location.href="login.html";
},1500);

}catch(error){

showToast("Erreur : "+error.message,"#e53935");

}

btn.classList.remove("loading");
btn.innerHTML="Créer un compte";

});

// connexion en 1 clic
import { GoogleAuthProvider, signInWithPopup } from 
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const provider=new GoogleAuthProvider();

const googleBtn=document.getElementById("googleSignIn");

googleBtn.addEventListener("click",async()=>{

try{

const result=await signInWithPopup(auth,provider);
const user=result.user;

showToast("Connexion Google réussie 🎉");

setTimeout(()=>{
window.location.href="index.html";
},1500);

}catch(error){

showToast("Erreur Google","#e53935");

}

});

</script>

<div id="toast"></div>

<script>

function showToast(message,color="#2e7d32"){

const toast=document.getElementById("toast");

toast.textContent=message;
toast.style.background=color;

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},3000);

}

</script>

</body>
</html>
