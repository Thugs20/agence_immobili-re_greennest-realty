<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactez-nous | GreenNest Realty</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">

    <section class="about-header">
    <div class="about-header-container">
      <a class="logo">
        <h2>🌿 GreenNest <span>Realty</span></h2>
      </a>
      <a href="index.html" class="btn btn-primary">Retour à l'accueil</a>
    </div>
  </section>

    <main class="contact-container">
        <section class="contact-intro">
            <h1>Parlons de votre projet</h1>
            <br>
            <p>Une question sur un bien ou besoin d'une estimation ? Nos experts en immobilier durable vous répondent.</p>
        </section>

        <div class="contact-grid">
            <div class="contact-form-card">
    <form id="contactForm">
        <div class="input-group">
            <label>Nom complet</label>
            <input type="text" placeholder="Votre nom" required>
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="votre@email.com" required>
        </div>
        <div class="input-group">
            <label>Objet</label>
            <select>
                <option>Demande d'information</option>
                <option>Prendre rendez-vous</option>
                <option>Estimation de bien</option>
            </select>
        </div>
        <div class="input-group">
            <label>Message</label>
            <textarea rows="5" placeholder="Comment pouvons-nous vous aider ?"></textarea>
        </div>
        <button type="submit" class="btn-contact">Envoyer le message</button>
    </form>
</div>

            <div class="contact-info-sidebar">
                <div class="info-item">
                    <i class="fas fa-phone"></i>
                    <div>
                        <h4>Téléphone</h4>
                        <p>+33 1 23 45 67 89</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <h4>Email</h4>
                        <p>contact@greennest.realty</p>
                    </div>
                </div>
                
                <div class="map-container">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2624.9916256937595!2d2.2922926156743895!3d48.85837007928746!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47e66e2964e34e2d%3A0x8ddca9ee380ef7e0!2sTour%20Eiffel!5e0!3m2!1sfr!2sfr!4v1647874000000!5m2!1sfr!2sfr" 
                        width="100%" height="250" style="border:0; border-radius:15px;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>
            </div>
        </div>
    </main>

      <!-- ========================= -->
  <!-- FOOTER SIMPLE -->
  <!-- ========================= -->
  <footer>
    <div class="footer-container">
      <p> &nbsp; © 2026 GreenNest Realty. Tous droits réservés.</p>
    </div>
  </footer>

    <script src="script.js"></script>
</body>
</html>
